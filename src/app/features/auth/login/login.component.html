<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">A</div>
    </div>
    <h1 class="login-title">Welcome to Dashify</h1>
    <p class="login-sub">Sign in to access your dashboard</p>

    <!-- Demo credentials -->
    <div class="demo-box">
      <p class="demo-label">🔑 Quick Login</p>
      <div class="demo-btns">
        <button (click)="fillAdmin()" class="demo-btn demo-btn--admin">
          <span class="demo-role">Admin</span>
          <span class="demo-email">admin&#64;demo.com</span>
        </button>
        <button (click)="fillUser()" class="demo-btn demo-btn--user">
          <span class="demo-role">User</span>
          <span class="demo-email">user&#64;demo.com</span>
        </button>
      </div>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" formControlName="email" class="form-input" placeholder="you@example.com" />
        <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="field-error">
          Valid email required.
        </p>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" formControlName="password" class="form-input" placeholder="Min 4 characters" />
        <p *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="field-error">
          Min 4 characters required.
        </p>
      </div>

      <div *ngIf="error()" class="error-alert">{{ error() }}</div>

      <button type="submit" class="btn-primary w-full justify-center py-3 text-base"
        [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="login-hint">Any password with 4+ characters works for demo</p>
  </div>
</div>
