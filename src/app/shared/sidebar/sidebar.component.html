<aside class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 border-r border-slate-700/50 flex flex-col transition-transform duration-300"
  [class.-translate-x-full]="isMobile && !open">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-700/50">
    <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">A</span>
    </div>
    <span class="text-white font-bold text-lg tracking-tight">Dashify</span>
  </div>

  <!-- User chip -->
  <div class="px-4 py-4 border-b border-slate-700/50">
    <div class="flex items-center gap-3 bg-slate-800 rounded-lg p-3">
      <div class="w-8 h-8 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-indigo-300 font-semibold text-xs">
        {{ auth.currentUser()?.name?.charAt(0) }}
      </div>
      <div class="min-w-0">
        <p class="text-white text-sm font-medium truncate">{{ auth.currentUser()?.name }}</p>
        <span *ngIf="auth.isAdmin()" class="badge-admin">Admin</span>
        <span *ngIf="!auth.isAdmin()" class="badge-user">User</span>
      </div>
    </div>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <ng-container *ngFor="let item of navItems">
      <a *ngIf="!item.adminOnly || auth.isAdmin()"
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-500/20 text-indigo-300 border-indigo-500/30"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="nav-link">
        <span class="text-lg">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
        <span *ngIf="item.adminOnly" class="ml-auto text-[10px] bg-purple-500/20 text-purple-400 px-1.5 py-0.5 rounded">Admin</span>
      </a>
    </ng-container>
  </nav>

  <!-- Logout -->
  <div class="p-4 border-t border-slate-700/50">
    <button (click)="auth.logout()" class="logout-btn">
      <span class="text-lg">🚪</span> Sign Out
    </button>
  </div>
</aside>

<!-- Mobile overlay -->
<div *ngIf="open && isMobile"
  class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm"
  (click)="closed.emit()">
</div>
